name: Publish to npm

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 20 ships npm 10.x.
      - run: npm install -g npm@latest

      - name: Check if version is already published
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists — skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.should_publish == 'true'
        run: npm ci

      - if: steps.check.outputs.should_publish == 'true'
        run: npm run build

      - if: steps.check.outputs.should_publish == 'true'
        run: npm test

      # No NODE_AUTH_TOKEN: auth is via OIDC Trusted Publishing (configured on
      # npmjs.com). npm auto-detects the OIDC token using the `id-token: write`
      # permission above. Provenance is implied by trusted publishing.
      - if: steps.check.outputs.should_publish == 'true'
        run: npm publish --provenance --access public

      - name: Tag release
        if: steps.check.outputs.should_publish == 'true'
        env:
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"
